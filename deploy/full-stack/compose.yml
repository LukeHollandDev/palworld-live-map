name: palworld-with-live-map

services:
  palworld:
    image: thijsvanloef/palworld-server-docker:latest
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-UTC}"
      PORT: "8211"
      QUERY_PORT: "27015"
      PLAYERS: "${PLAYERS:-16}"
      SERVER_NAME: "${SERVER_NAME:-Palworld with Live Map}"
      SERVER_DESCRIPTION: "${SERVER_DESCRIPTION:-A self-hosted Palworld dedicated server}"
      SERVER_PASSWORD: "${SERVER_PASSWORD:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}"
      COMMUNITY: "${COMMUNITY:-false}"
      CROSSPLAY_PLATFORMS: "${CROSSPLAY_PLATFORMS:-(Steam,Xbox,PS5,Mac)}"
      REST_API_ENABLED: "true"
      REST_API_PORT: "8212"
      ENABLE_GAMEDATA_API: "true"
      BACKUP_ENABLED: "true"
    ports:
      - "${PALWORLD_PORT:-8211}:8211/udp"
      - "${QUERY_PORT:-27015}:27015/udp"
    volumes:
      - ./palworld:/palworld

  map:
    image: ghcr.io/lukehollanddev/palworld-live-map:latest
    restart: unless-stopped
    environment:
      PALWORLD_REST_URL: http://palworld:8212
      PALWORLD_ADMIN_PASSWORD: "${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}"
      WORLD_DATA_ENABLED: "true"
      ADDR: :8080
    ports:
      - "${HTTP_PORT:-8080}:8080"
