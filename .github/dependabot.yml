version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /exporter
    schedule:
      interval: weekly
  - package-ecosystem: nuget
    directory: /exporter/src
    schedule:
      interval: weekly
    ignore:
      # CUE4Parse-Conversion pins these to exact versions, so they can only be
      # bumped in lockstep with a CUE4Parse-Conversion release that moves to them.
      # Keep these aligned with the exact versions required by CUE4Parse-Conversion.
      - dependency-name: "SixLabors.ImageSharp"
      - dependency-name: "SkiaSharp.NativeAssets.*"
