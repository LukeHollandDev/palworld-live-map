version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /tools/map-exporter
    schedule:
      interval: weekly
  - package-ecosystem: nuget
    directory: /tools/map-exporter
    schedule:
      interval: weekly
    ignore:
      # CUE4Parse-Conversion pins these to exact versions, so they can only be
      # bumped in lockstep with a CUE4Parse-Conversion release that moves to them.
      # ImageSharp 4.x also relicensed and requires a paid Six Labors license.
      - dependency-name: "SixLabors.ImageSharp"
      - dependency-name: "SkiaSharp.NativeAssets.*"
