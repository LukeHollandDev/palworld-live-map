<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>Palworld Live Map</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js" defer></script>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="server-identity">
          <h1 id="siteTitle">Palworld Live Map</h1>
          <span id="demoBadge" class="demo-badge" hidden>Demo data</span>
          <p id="serverDescription" hidden></p>
        </div>
        <div class="server-state">
          <button id="serverDetailsButton" class="server-details-button" type="button" aria-haspopup="dialog" aria-controls="detailsDialog" title="View server details">
            <span id="statusDot" class="status-dot" aria-hidden="true"></span>
            <span id="statusText" role="status">Connecting…</span>
            <span id="metricsSummary" hidden></span>
          </button>
          <span class="divider">·</span>
          <span id="updatedText">Waiting for data</span>
        </div>
      </header>

      <main class="map-shell">
        <div id="mapViewport" class="map-viewport">
          <div id="mapScene" class="map-scene">
            <img id="mapImage" class="map-image" alt="" draggable="false">
            <div class="fallback-grid" aria-hidden="true"></div>
            <div id="markerLayer" class="marker-layer">
              <div id="objectMarkerLayer" class="marker-sublayer"></div>
              <div id="playerMarkerLayer" class="marker-sublayer"></div>
            </div>
          </div>

          <button id="toggleFilters" class="filter-toggle" type="button" aria-controls="filterPanel" aria-expanded="true" hidden>Map</button>

          <aside id="filterPanel" class="filter-panel" aria-label="Map filters">
            <div class="panel-title">
              <strong>Map</strong>
              <button id="closeFilters" type="button" aria-label="Collapse map filter" title="Collapse map filter">‹</button>
            </div>

            <div id="layerTabs" class="layer-tabs" role="group" aria-label="World region"></div>

            <label class="search-field">
              <span>Filter map</span>
              <input id="searchInput" type="search" placeholder="Player, Pal or base…" autocomplete="off">
            </label>

            <div id="mapExplorer" class="map-explorer" aria-live="polite"></div>

            <p id="objectNotice" class="object-notice" hidden></p>
          </aside>

          <div id="mapNotice" class="map-notice" hidden>Map artwork is not installed.</div>

          <div class="map-controls" aria-label="Map controls">
            <button id="zoomOut" type="button" aria-label="Zoom out">−</button>
            <button id="fitMap" type="button">Fit</button>
            <button id="zoomIn" type="button" aria-label="Zoom in">+</button>
          </div>

          <div id="cursorCoordinates" class="coordinate-readout">X 0 · Y 0</div>
        </div>
      </main>
    </div>

    <dialog id="detailsDialog" class="details-dialog" aria-labelledby="detailsTitle">
      <article class="details-card">
        <header class="details-header">
          <div>
            <p id="detailsKind" class="details-kind"></p>
            <h2 id="detailsTitle"></h2>
          </div>
          <button id="closeDetails" class="details-close" type="button" aria-label="Close details">×</button>
        </header>
        <div id="detailsBody" class="details-body"></div>
      </article>
    </dialog>
  </body>
</html>
